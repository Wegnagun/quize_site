{% extends 'base.html' %}
{% load static %}

{% block title %}Раунд: {{ block.title }}{% endblock %}

{% block content %}
<div class="question-container">

    <!-- ПАНЕЛЬ УПРАВЛЕНИЯ РАУНДОМ -->
    <div style="text-align: center; margin-bottom: 30px; padding: 15px; border-radius: 12px; background: linear-gradient(90deg, #667eea 0%, #764ba2 100%); color: white; position: relative; overflow: hidden;">
        <h1 style="margin: 0 0 5px 0; font-size: 2rem;">{{ block.quiz.title }} / {{ block.title }}</h1>
        
        <!-- Индикатор прогресса вопросов -->
        <div id="progress-bar" style="height: 5px; width: 0%; background-color: rgba(255,255,255,0.5); margin-top: 10px; transition: width 0.5s ease;"></div>
        
        <!-- Навигация по вопросам (кнопки-цифры) -->
        <div id="nav-buttons" style="display: flex; justify-content: center; gap: 10px; margin-top: 15px; flex-wrap: wrap; opacity: 0.9;">
            {% for q in questions %}
                <button class="btn btn-outline nav-btn" data-qid="{{ q.id }}" style="padding: 8px 12px; font-size: 0.9rem; min-width: auto;">
                    {{ forloop.counter }}
                </button>
            {% endfor %}
        </div>
    </div>

    <!-- КОНТЕЙНЕР ВОПРОСА -->
    <div id="question-area">
        <!-- Контент будет вставлен сюда скриптом при клике -->
    </div>

</div>

<!-- СКРИПТ УПРАВЛЕНИЯ СЛАЙДЕРОМ ВОПРОСОВ -->
<script>
const questions = [
    {% for question in questions %}
        {
            id: {{ question.id }},
            text: "{{ question.text|escapejs }}",
            answer: "{{ question.answer|escapejs }}"
        }{% if not forloop.last %},{% endif %}
    {% endfor %}
];

let currentIndex = 0;

function renderQuestion(index) {
    const q = questions[index];
    const area = document.getElementById('question-area');
    
    // Очищаем интервал на случай, если остался от предыдущей версии кода
    clearInterval(window.currentTimer);

    area.innerHTML = `
        <div class="card shadow-lg" style="border-left: 8px solid var(--accent-color);">
            <div class="card-body p-4">
                <div style="font-size: 1.4rem; line-height: 1.5; margin-bottom: 20px;" id="q-text">${q.text}</div>
                
                <!-- Блок ответа для ведущего (визуально выделен) -->
                ${q.answer ? `<div style="background-color: #fff3cd; color: #856404; padding: 12px; border-radius: 8px; border-left: 4px solid #ffc107; margin-bottom: 20px;">
                    <strong>Ответ:</strong> ${q.answer}
                </div>` : ''}

                <!-- Кнопки действий без таймера -->
                <div style="display: flex; justify-content: space-between; align-items: center; border-top: 1px solid #dee2e6; padding-top: 20px;">
                    <button onclick="prevQuestion()" class="btn btn-outline" ${index === 0 ? 'disabled' : ''}>
                        &larr; Назад
                    </button>
                    
                    <div>
                        <button onclick="nextQuestion()" class="btn btn-success" id="nextBtn">
                            ${(index === questions.length - 1) ? 'Завершить раунд' : 'Следующий'} &rarr;
                        </button>
                    </div>
                </div>
            </div>
        </div>
    `;
    
    updateNavButtons(index);
    resetProgressBar();
}

function nextQuestion() {
    if (currentIndex < questions.length - 1) {
        currentIndex++;
        renderQuestion(currentIndex);
    } else {
        // Если это был последний вопрос блока — возвращаемся к таблице
        window.location.href = "{% url 'team_scores' %}";
    }
}

function prevQuestion() {
    if (currentIndex > 0) {
        currentIndex--;
        renderQuestion(currentIndex);
    }
}

function updateNavButtons(activeIndex) {
    document.querySelectorAll('.nav-btn').forEach(btn => {
        btn.classList.remove('btn-primary');
        btn.classList.add('btn-outline');
        if (parseInt(btn.dataset.qid) === questions[activeIndex].id) {
            btn.classList.remove('btn-outline');
            btn.classList.add('btn-primary');
        }
    });
}

function resetProgressBar() {
    const percent = ((currentIndex + 1) / questions.length) * 100;
    document.getElementById('progress-bar').style.width = percent + '%';
}

// Клики по кнопкам навигации "1, 2, 3..."
document.querySelectorAll('.nav-btn').forEach(btn => {
    btn.addEventListener('click', function() {
        const qid = parseInt(this.dataset.qid);
        const idx = questions.findIndex(q => q.id === qid);
        if (idx !== -1) {
            currentIndex = idx;
            renderQuestion(currentIndex);
        }
    });
});

renderQuestion(currentIndex);
</script>
{% endblock %}
