{% extends 'base.html' %}
{% load static %}

{% block title %}Добавить команду{% endblock %}

{% block content %}
<div class="question-container" style="max-width: 500px;">
    <h2>Регистрация команды</h2>
    
    <form method="post" action="{% url 'save_team' %}">
        {% csrf_token %}
        
        <div class="form-group">
            <label for="id_name">Название:</label>
            <input type="text" id="id_name" name="name" placeholder="Сборная библиотекарей" required autofocus>
        </div>
        
        <div class="form-group">
            <label for="id_score">Стартовые очки:</label>
            <input type="number" id="id_score" name="score" value="0" min="0" required>
        </div>
        
        <div style="margin-top: 30px; text-align: center;">
            <button type="submit" class="btn btn-primary">Сохранить</button>
            <a href="{% url 'team_scores' %}" class="btn btn-outline">К таблице</a>
        </div>
    </form>
</div>
{% endblock %}
