{% extends 'base.html' %}
{% load static %}

{% block title %}Вопрос {{ question.id }}{% endblock %}

{% block content %}
<div class="question-container">
    <div class="question-text">
        {{ question.text }}
    </div>

    <!-- Блок вариантов ответов -->
    <form method="post" action="{% url 'save_answer' question.id %}">
        {% csrf_token %}
        {% for option in question.options.all %}
            <label class="btn btn-outline" style="display:block; margin-bottom:10px; text-align:left; justify-content:flex-start;">
                <input type="radio" name="answer_choice" value="{{ option.id }}" required style="margin-right:15px; transform: scale(1.3);">
                {{ option.text }}
            </label>
        {% endfor %}
        
        <div style="margin-top: 30px;">
            <!-- Здесь логика выбора следующего шага -->
            {% if not next_question %}
                <!-- Если это последний вопрос -->
                <button type="submit" class="btn btn-primary">Завершить квиз</button>
            {% else %}
                <!-- Если есть следующий вопрос -->
                <button type="submit" class="btn btn-primary">Ответить и продолжить</button>
            {% endif %}
        </div>
    </form>
</div>
{% endblock %}
